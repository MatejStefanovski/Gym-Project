<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Gym Strong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        p input {
            width: 100%;
            background-color: #111827;
            border: 1px solid #374151;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            margin-top: 0.25rem;
            margin-bottom: 1rem;
            outline: none;
        }
        p input:focus { border-color: #f97316; }
        p label { font-size: 0.875rem; color: #9ca3af; font-weight: 500;}
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
    <div class="text-center mb-6">
        <span class="text-3xl font-black text-orange-500 tracking-wider">GYM STRONG</span>
        <h2 class="text-xl font-bold mt-2 text-white">Welcome back, log in:</h2>
    </div>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl transition mt-4 shadow-lg shadow-orange-500/20">
            Login to System
        </button>
    </form>

    <div class="text-center mt-6 pt-4 border-t border-gray-800 text-xs text-gray-500">
        Don't have an account? <a href="{% url 'register' %}" class="text-orange-500 hover:underline font-bold">Register here!</a>
    </div>
</div>
</body>
</html>
